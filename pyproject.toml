[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "electsim-espana"
version = "0.2.0"
description = "Digital twin de datos electorales, sociales y económicos de España (fase 1: arquitectura e ingesta)"
readme = "README.md"
requires-python = ">=3.11"

[project.optional-dependencies]
dev = [
    "mypy>=1.11.0",
    "pytest>=8.3.0",
    "ruff>=0.6.0",
]

[tool.setuptools.packages.find]
include = [
    "agents*",
    "analytics*",
    "api*",
    "compute*",
    "dashboard*",
    "db*",
    "etl*",
    "models*",
    "ontology*",
    "pipelines*",
    "validation*",
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_configs = true
namespace_packages = true
explicit_package_bases = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "integration: tests que requieren PostgreSQL u otros servicios",
]

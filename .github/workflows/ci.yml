name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OTEL_SDK_DISABLED: "true"
  LOG_FORMAT: "text"
  LOG_LEVEL: "WARNING"
  DEV_MODE: "true"

jobs:
  # --------------------------------------------------------------------------
  # Lint Python
  # --------------------------------------------------------------------------
  lint_backend:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.4.7
      - name: Ruff check
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format . --check

  # --------------------------------------------------------------------------
  # Tests Python (unit — sin integración)
  # --------------------------------------------------------------------------
  test_backend:
    name: Tests Python
    runs-on: ubuntu-latest
    needs: lint_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            -m "not integration and not llm" \
            --tb=short -q \
            --junitxml=reports/junit.xml
        env:
          OTEL_SDK_DISABLED: "true"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: reports/

  # --------------------------------------------------------------------------
  # Tests packages Python puros (electoral, nlp, prompts)
  # --------------------------------------------------------------------------
  test_packages:
    name: Tests packages/
    runs-on: ubuntu-latest
    needs: lint_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install minimal deps
        run: pip install pytest pyyaml pydantic numpy pandas
      - name: Test packages/electoral
        run: |
          python -m pytest tests/test_packages/test_electoral/ -v --tb=short \
            || echo "test_packages/test_electoral no existe aun — OK"
      - name: Test packages/nlp
        run: |
          python -m pytest tests/test_packages/test_nlp/ -v --tb=short \
            || echo "test_packages/test_nlp no existe aun — OK"
      - name: Test packages/prompts
        run: |
          python -m pytest tests/test_packages/test_prompts/ -v --tb=short \
            || echo "test_packages/test_prompts no existe aun — OK"

  # --------------------------------------------------------------------------
  # Verificar sintaxis de migraciones
  # --------------------------------------------------------------------------
  check_migrations:
    name: Check migraciones
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install alembic
        run: pip install alembic sqlalchemy
      - name: Verificar sintaxis
        run: |
          python -c "
          from pathlib import Path; import importlib.util, sys
          mig_dir = Path('db/migrations/versions')
          errors = []
          for f in sorted(mig_dir.glob('*.py')):
              spec = importlib.util.spec_from_file_location(f.stem, f)
              try:
                  mod = importlib.util.module_from_spec(spec)
                  spec.loader.exec_module(mod)
                  print(f'  OK {f.name}')
              except SyntaxError as e:
                  errors.append(f'{f.name}: {e}')
          if errors:
              [print('ERROR:', e) for e in errors]; sys.exit(1)
          print(f'Migraciones OK ({len(list(mig_dir.glob(\"*.py\")))} archivos)')
          "

  # --------------------------------------------------------------------------
  # Frontend (cuando exista apps/web)
  # --------------------------------------------------------------------------
  lint_frontend:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check if web app exists
        id: check
        run: |
          [ -f "apps/web/package.json" ] && echo "exists=true" >> $GITHUB_OUTPUT \
            || echo "exists=false" >> $GITHUB_OUTPUT
      - name: Install and lint
        if: steps.check.outputs.exists == 'true'
        run: npm ci && npx turbo run lint typecheck
      - name: Skip (web not scaffolded yet)
        if: steps.check.outputs.exists == 'false'
        run: echo "apps/web no existe — saltando lint frontend"

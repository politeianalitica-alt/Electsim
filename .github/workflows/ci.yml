name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy api/main.py api/observability.py api/routers/observability.py dashboard/repositories dashboard/services/institutional_service.py dashboard/views/congreso.py dashboard/pages/8_Tiempo_Real.py etl/electoral etl/run_perfiles.py validation/calidad_datos.py

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]
      - name: Tests
        run: pytest -q -m "not integration"

  integration-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: electsim_espana
          POSTGRES_USER: electsim
          POSTGRES_PASSWORD: electsim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U electsim -d electsim_espana"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://electsim:electsim@localhost:5432/electsim_espana
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]
      - name: Wait for database
        run: |
          python - <<'PY'
          import time
          import psycopg

          dsn = "postgresql://electsim:electsim@localhost:5432/electsim_espana"
          last_error = None
          for _ in range(30):
              try:
                  with psycopg.connect(dsn):
                      print("database-ready")
                      break
              except Exception as exc:
                  last_error = exc
                  time.sleep(2)
          else:
              raise SystemExit(f"database-not-ready: {last_error}")
          PY
      - name: Run migrations
        run: alembic upgrade head
      - name: Integration tests
        run: pytest -q -m integration

name: Visual Oscar — Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "apps/visual-oscar/**"
      - ".github/workflows/visual-oscar.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/visual-oscar/**"
      - ".github/workflows/visual-oscar.yml"

concurrency:
  group: visual-oscar-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/visual-oscar

jobs:
  build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      DEV_MODE: "true"
      LOG_FORMAT: "json"
      # Sin OLLAMA_URL para que el build use mocks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/visual-oscar/package-lock.json
      - name: Install deps
        run: npm install --no-audit --prefer-offline
      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true
      - name: Next build
        run: npm run build

  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 12
    if: false  # Activar cuando los tests Playwright estén configurados (Sprint 18)
    env:
      DEV_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/visual-oscar/package-lock.json
      - name: Install deps
        run: npm install --no-audit --prefer-offline
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npm run test:smoke

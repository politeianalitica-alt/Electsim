name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # Esperar a que CI pase antes de desplegar
  deploy_staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: []   # Añadir: [lint_backend, test_backend] cuando se active CI completo
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
        continue-on-error: true   # No bloquea si registry no está configurado

      - name: Build API image
        run: |
          docker build \
            --target api \
            --tag ${{ vars.REGISTRY_URL }}/electsim-api:${{ github.sha }} \
            --tag ${{ vars.REGISTRY_URL }}/electsim-api:latest \
            -f Dockerfile .
        continue-on-error: true

      - name: Build Workers image
        run: |
          docker build \
            --target workers \
            --tag ${{ vars.REGISTRY_URL }}/electsim-workers:${{ github.sha }} \
            --tag ${{ vars.REGISTRY_URL }}/electsim-workers:latest \
            -f Dockerfile .
        continue-on-error: true

      - name: Deploy to staging server
        run: |
          echo "Deploy a staging: ${{ github.sha }}"
          echo "Server: ${{ vars.STAGING_HOST }}"
          # Configurar SSH y ejecutar:
          # ssh user@staging "docker compose pull && docker compose up -d"
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}

      - name: Run smoke tests
        run: |
          echo "Smoke tests staging: ${{ vars.STAGING_URL }}/health"
          # curl --fail ${{ vars.STAGING_URL }}/health || exit 1
        continue-on-error: true

      - name: Notify deployment
        run: echo "Staging desplegado exitosamente — SHA ${{ github.sha }}"

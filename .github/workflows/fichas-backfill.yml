name: Fichas backfill nocturno

# Genera fichas dinámicas (territorios + políticos) cada noche.
#
# Estrategia:
#   · Políticos: itera lista Wikidata de cargos activos, construye 100/noche
#   · Territorios: top 200 municipios por población + 17 CCAA + 2 ciudades aut.
#   · Resultados → JSONL en artefacto + opcionalmente UPSERT a Postgres
#     (cuando DATABASE_URL esté en secretos)
#
# Idempotente. Las fichas existentes con completeness ≥ a la nueva no se sobreescriben.

on:
  schedule:
    # 03:00 UTC todas las noches (~05:00 CET)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      limit_politicos:
        description: "Máximo de políticos a procesar"
        required: false
        default: "50"
      limit_territorios:
        description: "Máximo de municipios a procesar (top población)"
        required: false
        default: "50"
      skip_politicos:
        description: "Saltar políticos"
        type: boolean
        default: false
      skip_territorios:
        description: "Saltar territorios"
        type: boolean
        default: false

jobs:
  fichas:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      OPENAI_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENAI_BASE_URL: https://api.groq.com/openai/v1
      ELECTSIM_OPENAI_MODEL: llama-3.3-70b-versatile
      ELECTSIM_LLM_PROVIDER: openai
      GROQ_MAX_TOKENS: "4096"
      GROQ_TEMPERATURE: "0.3"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OTEL_SDK_DISABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear directorios de salida
        run: |
          mkdir -p data/processed/brain_enrichment

      - name: Backfill políticos activos
        if: ${{ !inputs.skip_politicos }}
        env:
          LIMIT: ${{ inputs.limit_politicos || '50' }}
        run: |
          python -m pipelines.brain_enrich_existing backfill-politicos \
              --limit "$LIMIT" --persist || true

      - name: Backfill territorios prioritarios
        if: ${{ !inputs.skip_territorios }}
        env:
          LIMIT: ${{ inputs.limit_territorios || '50' }}
        run: |
          # Top municipios por importancia política · códigos INE estables
          # (Madrid, Barcelona, Valencia, Sevilla, Zaragoza, Málaga, Murcia, etc.)
          MUNICIPIOS_TOP="28079 08019 46250 41091 50297 29067 30030 07040 03014 35016 30024 33044 06015 13034 25120 26089 27028 31201 02003 04013"
          for cod in $MUNICIPIOS_TOP; do
            python -m pipelines.brain_enrich_existing ficha-territorio \
                --cod-ine "$cod" --persist 2>&1 | tail -3 || true
            sleep 2
          done

      - name: Backfill 17 CCAA + 2 ciudades autónomas
        if: ${{ !inputs.skip_territorios }}
        run: |
          CCAAS=(
            "Andalucía" "Aragón" "Asturias" "Islas Baleares" "Islas Canarias"
            "Cantabria" "Castilla-La Mancha" "Castilla y León" "Cataluña"
            "Extremadura" "Galicia" "Comunidad de Madrid" "Murcia"
            "Comunidad Foral de Navarra" "País Vasco" "La Rioja"
            "Comunidad Valenciana" "Ceuta" "Melilla"
          )
          for ccaa in "${CCAAS[@]}"; do
            python -m pipelines.brain_enrich_existing ficha-territorio \
                --ccaa "$ccaa" --persist 2>&1 | tail -3 || true
            sleep 2
          done

      - name: Conteo de fichas generadas
        run: |
          echo "Territorios JSONL:"
          ls -la data/processed/brain_enrichment/ficha_territorial_*.jsonl 2>/dev/null | wc -l
          echo "Políticos JSONL:"
          ls -la data/processed/brain_enrichment/ficha_politico_*.jsonl 2>/dev/null | wc -l

      - name: Upload artefactos JSONL
        uses: actions/upload-artifact@v4
        with:
          name: fichas-${{ github.run_number }}
          path: data/processed/brain_enrichment/*.jsonl
          retention-days: 30
          if-no-files-found: warn

      - name: Notificar resumen
        if: always()
        run: |
          TERR_COUNT=$(ls data/processed/brain_enrichment/ficha_territorial_*.jsonl 2>/dev/null | wc -l)
          POL_COUNT=$(ls data/processed/brain_enrichment/ficha_politico_*.jsonl 2>/dev/null | wc -l)
          echo "## Backfill nocturno · $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Territorios construidos: **$TERR_COUNT**" >> $GITHUB_STEP_SUMMARY
          echo "- Políticos construidos:   **$POL_COUNT**" >> $GITHUB_STEP_SUMMARY
          echo "- Artefactos guardados en run #${{ github.run_number }} (30d)" >> $GITHUB_STEP_SUMMARY

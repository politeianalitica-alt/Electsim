<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" fill="currentColor">
  <!-- Capitel jónico: ábaco superior + voluta izquierda + voluta derecha + collarín -->
  <!-- Ábaco -->
  <rect x="8" y="6" width="104" height="6" rx="1"/>
  <!-- Banda con volutas -->
  <path d="M 8 14
           Q 8 22, 18 22
           Q 28 22, 28 14
           L 28 24
           L 92 24
           L 92 14
           Q 92 22, 102 22
           Q 112 22, 112 14
           Z" />
  <!-- Volutas (espirales) izquierda y derecha como círculos pequeños -->
  <circle cx="18" cy="18" r="3.5" fill="#fff"/>
  <circle cx="18" cy="18" r="2"/>
  <circle cx="102" cy="18" r="3.5" fill="#fff"/>
  <circle cx="102" cy="18" r="2"/>
  <!-- Collarín bajo el capitel -->
  <rect x="14" y="28" width="92" height="4" rx="1"/>
  <!-- 3 barras crecientes (gráfico) -->
  <rect x="26" y="58" width="18" height="44" rx="2"/>
  <rect x="52" y="48" width="18" height="54" rx="2"/>
  <rect x="78" y="38" width="18" height="64" rx="2"/>
</svg>

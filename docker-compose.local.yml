version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# ElectSim España — Stack local completo
# Uso: docker compose -f docker-compose.local.yml up --build
#
# Incluye:
#   - PostgreSQL 16
#   - Dashboard Streamlit (http://localhost:8501)
#
# Ollama corre en tu máquina host (localhost:11434).
# El dashboard se conecta a él via host.docker.internal.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Base de datos ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: electsim_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: electsim_espana
      POSTGRES_USER: electsim
      POSTGRES_PASSWORD: electsim
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # seeds al crear
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electsim -d electsim_espana"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Dashboard ────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: electsim_dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+psycopg://electsim:electsim@postgres:5432/electsim_espana"
      # OLLAMA_HOST es la variable que lee el cliente Python de Ollama
      OLLAMA_HOST: "http://host.docker.internal:11434"
      ELECTSIM_OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
      ELECTSIM_OLLAMA_FAST_MODEL: "llama3.2:3b"
      ELECTSIM_OLLAMA_GENERAL_MODEL: "qwen2.5:7b"
      ELECTSIM_OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    ports:
      - "8501:8501"
    volumes:
      # Hot-reload: monta el código local para editar sin reconstruir
      - ./dashboard:/app/dashboard
      - ./.streamlit:/app/.streamlit

volumes:
  pgdata:

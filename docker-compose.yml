services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: electsim_espana
      POSTGRES_USER: ${POSTGRES_USER:-electsim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seeds/02_seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-electsim} -d electsim_espana"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-change_me_in_production}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  prefect:
    image: prefecthq/prefect:2-python3.11
    volumes:
      - .:/app
    working_dir: /app
    environment:
      PREFECT_API_URL: http://127.0.0.1:4200/api
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"

  prefect-worker:
    build:
      context: .
      dockerfile: docker/prefect-worker/Dockerfile
    env_file: .env
    environment:
      PREFECT_API_URL: http://prefect:4200/api
    depends_on:
      - postgres
      - prefect
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:

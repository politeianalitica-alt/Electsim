services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: electsim_espana
      POSTGRES_USER: ${POSTGRES_USER:-electsim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-electsim}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seeds/02_seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-electsim} -d electsim_espana"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-change_me_in_production}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  prefect:
    image: prefecthq/prefect:2-python3.11
    volumes:
      - .:/app
    working_dir: /app
    environment:
      PREFECT_API_URL: http://0.0.0.0:4200/api
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"

  prefect-worker:
    build:
      context: .
      dockerfile: docker/prefect-worker/Dockerfile
    env_file: .env
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-electsim}:${POSTGRES_PASSWORD:-electsim}@postgres:5432/electsim_espana
      PYTHONPATH: /app
      ETL_CACHE_DIR: /tmp/.etl_cache
    command: >
      /bin/sh -lc "prefect work-pool create default-pool -t process >/dev/null 2>&1 || true;
      prefect worker start --pool default-pool"
    depends_on:
      postgres:
        condition: service_healthy
      prefect:
        condition: service_started
    restart: unless-stopped
    volumes:
      - .:/app
      - etl_cache:/tmp/.etl_cache

  electsim-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-electsim}:${POSTGRES_PASSWORD:-electsim}@postgres:5432/electsim_espana
      MICRODATOS_DIR: /app/data/microdatos
      PYTHONPATH: /app
      ETL_CACHE_DIR: /tmp/.etl_cache
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/microdatos:/app/data/microdatos
      - etl_cache:/tmp/.etl_cache
    ports:
      - "8000:8000"

  electsim-dashboard:
    image: node:20-alpine
    working_dir: /app/dashboard/spa
    volumes:
      - .:/app
    command: /bin/sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - electsim-api
    ports:
      - "5173:5173"

volumes:
  pgdata:
  miniodata:
  etl_cache:

# ============================================================
# ALIASES.YAML  —  Registro canonico de entidades politicas
# ============================================================
# Formato por entrada:
#   QID: identificador canonico unico (Q + numero)
#   nombre_oficial: nombre oficial completo
#   tipo: Persona | Partido | Institucion | Medio | Lugar
#   aliases: lista de menciones equivalentes (case-insensitive en lookup)
#   excluir_si_contexto: lista de contextos en los que este alias NO aplica
#   cargo_actual: cargo o rol actual (opcional)
#   partido: QID del partido (para personas)
#   pais: codigo ISO-2 (opcional)
# ============================================================


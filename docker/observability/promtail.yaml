# Promtail config — ElectSim Bloque 7
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: electsim_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=electsim"]

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

    pipeline_stages:
      # Los contenedores ElectSim emiten JSON (LOG_FORMAT=json)
      - json:
          expressions:
            level: level
            component: component
            trace_id: trace_id
            org_id: org_id
      - labels:
          level:
          component:
      - timestamp:
          source: timestamp
          format: RFC3339

code: "spain"
name: "España"
default_locale: "es-ES"
locales:
  - "es-ES"
  - "ca-ES"
  - "eu-ES"
  - "gl-ES"
timezone: "Europe/Madrid"
currency: "EUR"

political_system:
  country_iso: "ES"
  electoral_system:
    type: "dHondt"
    constituencies_source: "ine"
    num_constituencies: 52
    barrier_threshold: 0.03
  parliament:
    national:
      name: "Congreso de los Diputados"
      api_base_url: "https://api.congreso.es"
      chambers:
        - "congreso"
        - "senado"
      total_seats: 350
    regional:
      count: 17


  - slug: "elmundo"
    name: "El Mundo"
    category: "nacional"
    rss_url: "https://e00-elmundo.uecdn.es/elmundo/rss/espana.xml"
    bias_hint: "center-right"
  - slug: "abc"
    name: "ABC"
    category: "nacional"
    rss_url: "https://www.abc.es/rss/feeds/abc_EspanaEspana.xml"

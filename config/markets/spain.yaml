regulators:
  - slug: "cnmc"
    name: "Comision Nacional de los Mercados y la Competencia"
    website: "https://www.cnmc.es"
  - slug: "bde"
    name: "Banco de España"
    website: "https://www.bde.es"
  - slug: "cnmv"
    name: "Comision Nacional del Mercado de Valores"
    website: "https://www.cnmv.es"
  - slug: "dpd"
    name: "Agencia Española de Proteccion de Datos"
    website: "https://www.aepd.es"

ingestion_sources:
  - id: "boe"
    type: "legislation_boe"
    enabled: true
    description: "BOE API oficial"
    schedule_cron: "*/30 * * * *"
    params:
      api_base_url: "https://api.boe.es"
      sections:
        - "I"
        - "III"
        - "V"

  - id: "bocg"
    type: "legislation_bocg"
    enabled: true
    description: "Boletin Oficial de las Cortes Generales"
    schedule_cron: "*/15 * * * *"
    params:
      base_url: "https://www.congreso.es"

  - id: "media_rss_nacional"
    type: "media_rss"
    enabled: true
    description: "Medios nacionales via RSS"
    schedule_cron: "*/5 * * * *"
    params:
      outlets_slugs:
        - "elpais"
        - "elmundo"
        - "abc"
        - "eldiario"
        - "elconfidencial"

  - id: "media_rss_regional"
    type: "media_rss"
    enabled: true
    description: "Medios regionales via RSS"
    schedule_cron: "*/15 * * * *"
    params:
      outlets_slugs:
        - "lavanguardia"

  - id: "cis_polls"
    type: "polls_cis"
    enabled: true
    description: "Barometros mensuales del CIS"
    schedule_cron: "0 0 * * *"
    params:
      api_base_url: "https://www.cis.es"

  - id: "interior_resultados"
    type: "electoral_interior"
    enabled: true
    description: "Resultados electorales del Ministerio del Interior"
    schedule_cron: "0 */6 * * *"
    params:
      base_url: "https://infoelectoral.interior.gob.es"

  - id: "ine_padron"
    type: "demographics_ine"
    enabled: true
    description: "Padron municipal INE"
    schedule_cron: "0 4 * * 1"
    params:
      api_base_url: "https://servicios.ine.es/wstempus/js"
      operations:
        - "2853"

calendar:
  fixed_events:
    - code: "general_election"
      name: "Elecciones Generales"
      recurrence: "variable"
    - code: "autonomic_election"
      name: "Elecciones Autonomicas"
      recurrence: "variable"
    - code: "municipal_election"
      name: "Elecciones Municipales"
      recurrence: "variable"
    - code: "pge_presentation"
      name: "Presentacion Presupuestos Generales del Estado"
      recurrence: "yearly"
    - code: "state_of_the_nation"
      name: "Debate sobre el Estado de la Nacion"
      recurrence: "variable"
  ics_sources: []

dlcs_available:
  - "war_room_electoral_spain"
  - "regulatory_radar_spain"
  - "energy_spain"
  - "defence_spain"
  - "territorial_spain"

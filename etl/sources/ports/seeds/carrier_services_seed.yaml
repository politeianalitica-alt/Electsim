# Seed `carrier_services` · Sprint 2 Fase D
#
# 30 servicios principales de las top navieras · port_rotation simplificada
# a 6-8 escalas por servicio. Datos públicos: webs de navieras sección
# "Schedule" / "Service Map" + memorias 2024-2025.
#
# trade_lane convenciones:
#   asia_eu        · Asia ↔ North Europe (vía Suez)
#   asia_med       · Asia ↔ Mediterráneo (vía Suez)
#   transpac       · Asia ↔ West Coast USA
#   transpac_east  · Asia ↔ East Coast USA (vía Panama)
#   transatlantic  · USA ↔ Europe
#   intra_eu       · Intra-European (incluye Med-Norte)
#   me_eu          · Middle East ↔ Europe
#   intra_asia     · Servicios feeder Asia
#   africa         · Asia/Eu ↔ África Occidental/Sur

